<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1st Anniversary 💖</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:linear-gradient(135deg,#ffe6eb,#fff);
    overflow-x:hidden;
    text-align:center;
    color:#b44b72;
}

/* LOCK SCREEN */
#lock{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,240,245,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}
#wax{
    font-size:80px;
    cursor:pointer;
    animation:pulse 2s infinite;
    transition:1s;
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.1);}
}

/* Romantic Background */
.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(255,182,193,0.25), transparent 60%);
    animation:glow 8s infinite alternate;
    z-index:-1;
}
@keyframes glow{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

/* Falling hearts */
.heart{
    position:fixed;
    top:-10px;
    color:#ff8fa3;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(100vh);}
}

h1{
    text-shadow:0 0 15px pink,0 0 25px #ffb6c1;
}

/* Envelope */
.env{
    width:260px;
    height:150px;
    margin:20px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,182,193,0.6);
    cursor:pointer;
    position:relative;
}
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#f8c8dc;
    transform-origin:top;
    transition:1s;
}
.open .flap{transform:rotateX(180deg);}
.letter{
    display:none;
    padding:10px;
}
.open .letter{display:block;}

textarea{
    width:90%;
    height:70px;
    border-radius:10px;
    border:1px solid pink;
}

button{
    padding:10px 16px;
    margin:8px;
    border:none;
    border-radius:20px;
    background:#e6a4b4;
    color:white;
    cursor:pointer;
    box-shadow:0 0 10px pink;
}
button:hover{
    transform:scale(1.05);
    background:#d46a8c;
}

/* Gallery */
.gallery img{
    width:110px;
    margin:8px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(255,182,193,0.7);
}

/* Memory Map */
.map{
    width:90%;
    height:350px;
    margin:auto;
    background:#fff0f5;
    border:2px dashed pink;
    position:relative;
    overflow:hidden;
}
.pin{
    position:absolute;
    font-size:22px;
}
.pol{
    position:absolute;
    width:120px;
    background:white;
    padding:6px;
    box-shadow:0 0 15px rgba(255,182,193,0.6);
    cursor:grab;
}
.pol img{width:100%;}
.cap{
    width:100%;
    border:none;
    text-align:center;
}

/* Floating Love Notes */
.note{
    position:absolute;
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 10px pink;
    animation:float 6s infinite ease-in-out;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}
</style>
</head>
<body>

<div id="lock">
    <h2>🔒 Enter Password</h2>
    <input type="password" id="pass">
    <button onclick="unlock()">Unlock 💌</button>
    <div id="wax">🔴</div>
</div>

<div class="bg"></div>

<h1>💖 Happy 1st Anniversary 💖</h1>

<div class="env" id="env" onclick="toggleEnv()">
    <div class="flap"></div>
    <div class="letter">
        <textarea id="msg" placeholder="Write your love message..."></textarea>
        <p id="show"></p>
        <button onclick="save()">Save Message</button>
    </div>
</div>

<input type="file" id="musicUpload" accept="audio/*">
<button onclick="musicToggle()">🎵 Music</button>
<button onclick="share()">🔗 Share</button>

<audio id="music" loop></audio>

<h3>Gallery 🖼️</h3>
<input type="file" id="galleryUpload" multiple accept="image/*" onchange="galleryLoad(event)">
<div class="gallery" id="gallery"></div>

<h3>Memory Map 📍</h3>
<div class="map" id="map" onclick="place(event)"></div>

<script>
const PASS="love123";
let uploadedImages=[];

function unlock(){
    if(document.getElementById("pass").value===PASS){
        document.getElementById("lock").style.display="none";
    } else alert("Wrong password 💔");
}

document.getElementById("wax").onclick=()=>{
    document.getElementById("wax").style.transform="scale(0) rotate(360deg)";
};

function toggleEnv(){
    document.getElementById("env").classList.toggle("open");
}

function save(){
    let m=document.getElementById("msg").value;
    document.getElementById("show").innerText=m;
    localStorage.setItem("msg",m);
}

window.onload=()=>{
    let m=localStorage.getItem("msg");
    if(m) document.getElementById("show").innerText=m;
}

function share(){
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied 💌");
}

document.getElementById("musicUpload").addEventListener("change", e=>{
    let file=e.target.files[0];
    if(file){
        document.getElementById("music").src=URL.createObjectURL(file);
    }
});

function musicToggle(){
    let music=document.getElementById("music");
    music.paused ? music.play() : music.pause();
}

setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

function galleryLoad(e){
    let g=document.getElementById("gallery");
    uploadedImages = Array.from(e.target.files);
    g.innerHTML="";
    uploadedImages.forEach(f=>{
        let img=document.createElement("img");
        img.src=URL.createObjectURL(f);
        g.appendChild(img);
    });
}

function place(e){
    if(uploadedImages.length===0) return alert("Upload gallery images first!");
    let file=uploadedImages[Math.floor(Math.random()*uploadedImages.length)];
    let map=document.getElementById("map");

    let pin=document.createElement("div");
    pin.className="pin";
    pin.innerHTML="📍";
    pin.style.left=e.offsetX+"px";
    pin.style.top=e.offsetY+"px";
    map.appendChild(pin);

    let pol=document.createElement("div");
    pol.className="pol";
    pol.style.left=e.offsetX+"px";
    pol.style.top=(e.offsetY+25)+"px";

    pol.innerHTML = `
        <img src="${URL.createObjectURL(file)}">
        <input class="cap" placeholder="Our memory here 💕">
    `;
    map.appendChild(pol);

    drag(pol);
}

function drag(el){
    let down=false,dx,dy;
    el.onmousedown=e=>{
        down=true;
        dx=e.offsetX;
        dy=e.offsetY;
    };
    document.onmousemove=e=>{
        if(!down)return;
        el.style.left=(e.pageX-dx)+"px";
        el.style.top=(e.pageY-dy)+"px";
    };
    document.onmouseup=()=>down=false;
}

const messages=[
    "You are my favorite memory 💕",
    "Forever starts with us 💖",
    "Every day with you is magic ✨",
    "You are my home ❤️"
];

setInterval(()=>{
    let n=document.createElement("div");
    n.className="note";
    n.innerText=messages[Math.floor(Math.random()*messages.length)];
    n.style.left=Math.random()*80+"vw";
    n.style.top=Math.random()*80+"vh";
    document.body.appendChild(n);
    setTimeout(()=>n.remove(),7000);
},3000);
</script>
</body>
</html>
